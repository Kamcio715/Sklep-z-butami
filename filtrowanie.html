<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Filter HTML Example</title>
</head>
<body>

<h2>Filter List Example</h2>
<input type="text" id="searchInput" placeholder="Search items...">

<ul id="itemList">
    <li><div>
            <div>
                <img src="baza danych" alt="but">
            </div>
            <div>
                <h1>but1</h1>
                <h2>cena</h2>
                <h3>opis</h3>
            </div>
        </div>
    </li>
    <li><div>
            <div>
                <img src="baza danych" alt="but">
            </div>
            <div>
                <h1>but2</h1>
                <h2>cena</h2>
                <h3>opis</h3>
            </div>
        </div>
    </li>
    <li><div>
            <div>
                <img src="baza danych" alt="but">
            </div>
            <div>
                <h1>but3</h1>
                <h2>cena</h2>
                <h3>opis</h3>
            </div>
        </div>
    </li>
    <li>Grapes</li>
    <li>Watermelon</li>
    <li>Strawberry</li>
</ul>

<script>
// Get references to input and list
const searchInput = document.getElementById('searchInput');
const items = document.querySelectorAll('#itemList li');

// Listen for input changes
searchInput.addEventListener('input', function () {
    const filterText = this.value.trim().toLowerCase();

    // Loop through list items and toggle visibility
    items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.classList.toggle('hidden', !text.includes(filterText));
    });
});
</script>

</body>
</html>
